# Minimal LiteLLM config — relay-only mode.
#
# Dependencies removed for fast-ship:
#   - Postgres DB (spend logs, virtual keys, admin UI)  → gone
#   - Langfuse callback (request/response logging)      → gone
#   - Presidio guardrail (text PII masking)             → gone (requires
#                                                         a Presidio
#                                                         service)
#
# What remains: master-key auth + proxy to Anthropic. Local visual
# redaction in the Electron app still runs independently — this layer
# is just the relay.
#
# When we're ready for the full story, re-add Postgres + the disabled
# sections below.

model_list:
  - model_name: tabula-extract
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 4096

  - model_name: tabula-extract-text
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 2048

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120
  redact_messages_in_exceptions: true
  redact_user_api_key_info: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # No database_url — spend logs + virtual keys disabled.
  disable_spend_logs: true
  store_model_in_db: false
